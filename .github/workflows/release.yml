name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  copr-build:
    name: Build SRPM and submit to COPR
    runs-on: ubuntu-latest
    container: fedora:42

    steps:
      - name: Install SRPM build prerequisites
        run: dnf install -y git rpm-build copr-cli

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate tag format (vX.Y.Z)
        run: |
          if ! [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${GITHUB_REF_NAME}' does not match required format: v<major>.<minor>.<patch>"
            exit 1
          fi

      - name: Sync RPM spec version with tag
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          sed -i -E "s/^(%global base_version )[0-9]+\.[0-9]+\.[0-9]+$/\1${release_version}/" subsurface-to-ssi-qr.spec
          grep -n '^%global base_version ' subsurface-to-ssi-qr.spec

      - name: Build SRPM
        run: |
          mkdir -p rpmbuild/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
          rpmbuild -bs --define "_topdir ${GITHUB_WORKSPACE}/rpmbuild" subsurface-to-ssi-qr.spec
          srpm_path="$(ls "${GITHUB_WORKSPACE}"/rpmbuild/SRPMS/*.src.rpm)"
          echo "SRPM_PATH=${srpm_path}" >> "$GITHUB_ENV"

      - name: Configure copr-cli credentials
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          mkdir -p "$HOME/.config"
          cat > "$HOME/.config/copr" <<EOF
          [copr-cli]
          login = $COPR_LOGIN
          username = $COPR_USERNAME
          token = $COPR_TOKEN
          copr_url = https://copr.fedorainfracloud.org
          EOF
          chmod 600 "$HOME/.config/copr"

      - name: Submit build to COPR
        run: copr-cli build szydell/subsurface-to-ssi-qr "${SRPM_PATH}"

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate tag format (vX.Y.Z)
        run: |
          if ! [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${GITHUB_REF_NAME}' does not match required format: v<major>.<minor>.<patch>"
            exit 1
          fi

      - name: Install Linux GUI build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxxf86vm-dev \
            libgl1-mesa-dev

      - name: Install make on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install make -y

      - name: Doctor checks
        run: make doctor

      - name: Run tests
        run: make test

      - name: Build release artifacts
        run: make build-release-artifacts VERSION=${GITHUB_REF_NAME}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/subsurface-ssi-cli-*
            dist/subsurface-ssi-gui-*
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/subsurface-ssi-cli-*
            dist/subsurface-ssi-gui-*
            dist/SHA256SUMS.txt
          generate_release_notes: true
