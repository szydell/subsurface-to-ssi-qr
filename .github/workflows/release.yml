name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  bump-spec:
    name: Bump RPM spec version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate tag format (vX.Y.Z)
        run: |
          if ! [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${GITHUB_REF_NAME}' does not match required format: v<major>.<minor>.<patch>"
            exit 1
          fi

      - name: Sync RPM spec version with tag
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          sed -i -E "s/^(%global base_version )[0-9]+\.[0-9]+\.[0-9]+$/\1${release_version}/" subsurface-to-ssi-qr.spec
          grep -n '^%global base_version ' subsurface-to-ssi-qr.spec

      - name: Commit spec version bump
        run: |
          if git diff --quiet -- subsurface-to-ssi-qr.spec; then
            echo "Spec version already matches tag; nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subsurface-to-ssi-qr.spec
          git commit -m "chore(rpm): bump spec to ${GITHUB_REF_NAME} [skip ci]"
          git push origin HEAD:main

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: bump-spec
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate tag format (vX.Y.Z)
        run: |
          if ! [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${GITHUB_REF_NAME}' does not match required format: v<major>.<minor>.<patch>"
            exit 1
          fi

      - name: Install Linux GUI build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxxf86vm-dev \
            libgl1-mesa-dev

      - name: Install make on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install make -y

      - name: Doctor checks
        run: make doctor

      - name: Run tests
        run: make test

      - name: Build release artifacts
        run: make build-release-artifacts VERSION=${GITHUB_REF_NAME}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/subsurface-ssi-cli-*
            dist/subsurface-ssi-gui-*
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/subsurface-ssi-cli-*
            dist/subsurface-ssi-gui-*
            dist/SHA256SUMS.txt
          generate_release_notes: true
